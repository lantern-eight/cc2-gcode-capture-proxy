services:
  cc2-proxy:
    build: .
    container_name: cc2-gcode-proxy
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE  # Allow non-root process to bind to port 80
    ports:
      - "${HOST_HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${HOST_MQTT_PORT:-1883}:${MQTT_PORT:-1883}"
      - "${HOST_CAMERA_PORT:-8080}:${CAMERA_PORT:-8080}"
      - "${HOST_MQTT_WS_PORT:-9001}:${MQTT_WS_PORT:-9001}"
    volumes:
      - ./gcode-archive:/data/gcode
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"   # Rotate when each log file reaches 10 MB
        max-file: "3"     # Keep up to 3 rotated files (~30 MB total)
